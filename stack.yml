services:
  # Swarm/Portainer Stack debe consumir una imagen ya publicada.
  # Los secretos y variables se cargan desde la UI de Portainer.
  restroflux-app:
    image: ${RESTROFLUX_IMAGE:-ghcr.io/iitheshadowii/restroflux-app:latest}
    ports:
      - target: 3000
        published: ${APP_HTTP_PORT:-3000}
        protocol: tcp
        mode: ingress
    environment:
      APP_MODE: ${APP_MODE:-CLOUD}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-restroflux-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-restroflux}
      DB_USER: ${POSTGRES_USER:-restroflux}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      GLOBAL_ADMIN_BOOTSTRAP_TOKEN: ${GLOBAL_ADMIN_BOOTSTRAP_TOKEN:-}
      MULTI_TENANT_ENFORCE_AUTH: ${MULTI_TENANT_ENFORCE_AUTH:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-RestroFlux <no-reply@example.invalid>}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-restroflux-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-restroflux}
    depends_on:
      - restroflux-postgres
      - restroflux-minio
    networks:
      - restroflux-net
    deploy:
      restart_policy:
        condition: on-failure

  restroflux-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-restroflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-restroflux}
    volumes:
      - restroflux-pgdata:/var/lib/postgresql/data
    networks:
      restroflux-net:
        aliases:
          - restroflux-postgres
    deploy:
      restart_policy:
        condition: on-failure

  restroflux-minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - restroflux-miniodata:/data
    networks:
      restroflux-net:
        aliases:
          - restroflux-minio
    deploy:
      restart_policy:
        condition: on-failure

networks:
  restroflux-net:
    driver: overlay
    attachable: true

volumes:
  restroflux-pgdata:
  restroflux-miniodata:
